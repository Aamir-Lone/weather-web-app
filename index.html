<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="weather-bg"></div>
    <div class="container">
      <h1>Weather App</h1>
      <div class="input-container">
        <input type="text" id="city-input" placeholder="Enter city name" />
        <button id="get-weather-btn">Get Weather</button>
      </div>
      <div id="weather-info" class="hidden">
        <h2 id="city-name"></h2>
        <p id="date-display"></p>
        <p id="temperature"></p>
        <p id="description"></p>
        <p id="iconDisplay"></p>
        <div class="extra-info">
          <div class="info-item">
            <span class="info-label">Feels Like</span>
            <span id="feels-like"></span>
          </div>
          <div class="info-item">
            <span class="info-label">Humidity</span>
            <span id="humidity"></span>
          </div>
          <div class="info-item">
            <span class="info-label">Wind Speed</span>
            <span id="wind-speed"></span>
          </div>
        </div>

        <div class="forecast-container">
          <h3>5-Day Forecast</h3>
          <div id="forecast-list" class="forecast-list">
            <!-- Forecast items will be injected here via JS -->
          </div>
        </div>
      </div>
      <p id="error-message" class="hidden">City not found. Please try again.</p>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
